name: Weekly WIM Support Metrics

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      week:
        description: "Optional ISO week key like 2026-W26"
        required: false
        type: string
      force:
        description: "Overwrite existing generated files"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  weekly:
    runs-on: ubuntu-latest
    env:
      JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
      JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
      JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
      CONFLUENCE_BASE_URL: ${{ secrets.CONFLUENCE_BASE_URL }}
      CONFLUENCE_EMAIL: ${{ secrets.CONFLUENCE_EMAIL }}
      CONFLUENCE_API_TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
      CONFLUENCE_SPACE_KEY: WWIM
      CONFLUENCE_PARENT_PAGE_ID: "6499926021"

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install ".[dev]"

      - name: Run weekly pipeline
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            python scripts/weekly.py --force
          elif [ -n "${{ inputs.week }}" ] && [ "${{ inputs.force }}" = "true" ]; then
            python scripts/weekly.py "${{ inputs.week }}" --force
          elif [ -n "${{ inputs.week }}" ]; then
            python scripts/weekly.py "${{ inputs.week }}"
          elif [ "${{ inputs.force }}" = "true" ]; then
            python scripts/weekly.py --force
          else
            python scripts/weekly.py
          fi

      - name: Commit generated artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p data/export data/reports
          git add data/export data/reports
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "Update weekly WIM support metrics"
            git push
          fi
